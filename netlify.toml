[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Friendly path for the GHL webhook
[[redirects]]
  from = "/api/ghl-webhook"
  to = "/.netlify/functions/ghl-webhook"
  status = 200

[[redirects]]
  from = "/api/send-email"
  to = "/.netlify/functions/send-email"
  status = 200

[[redirects]]
  from = "/api/send-sms"
  to = "/.netlify/functions/send-sms"
  status = 200

[[redirects]]
  from = "/api/rc-inbound-sms"
  to = "/.netlify/functions/rc-inbound-sms"
  status = 200

[[redirects]]
  from = "/api/rc-subscribe"
  to = "/.netlify/functions/rc-subscribe"
  status = 200
